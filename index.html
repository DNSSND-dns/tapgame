<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrenaline Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="game">
      <div id="bgLayer"></div>
      <div id="hud">
        <div id="hudText">
          <div id="score">Taps: 0</div>
          <div id="best">Best Taps: -</div>
          <div id="target">Level 1 | Time 20s | Target 40s</div>
        </div>
        <div id="hudCenterMeter">
          <div id="timeMeter">
            <div id="bar"><div id="fill"></div></div>
            <div id="time">Time Left: 00:30:00</div>
          </div>
        </div>
        <div id="hudActions">
          <button id="startBtn" type="button">Start</button>
          <button id="autoBtn" type="button">Auto: OFF</button>
        </div>
      </div>
      <div id="overlay">Press Start</div>
      <canvas id="canvas" width="400" height="600"></canvas>
      <div id="loseFill"></div>
    </div>

    <section id="feedback" aria-label="Feedback">
      <h2>Global Feedback</h2>
      <form id="feedbackForm">
        <input id="feedbackName" name="name" type="text" maxlength="24" placeholder="Your name" required>
        <textarea id="feedbackText" name="comment" maxlength="280" placeholder="Your comment" required></textarea>
        <button type="submit">Send</button>
      </form>
      <p id="feedbackStatus"></p>
      <p id="emptyComments" class="emptyComments">No comments yet.</p>
      <ul id="feedbackList" aria-live="polite"></ul>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
