<!doctype html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrenaline Mode</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0e1014;
      color: #eef2f7;
      font-family: Arial, sans-serif;
    }
    #game {
      position: relative;
      width: 400px;
      height: 600px;
      background: #171a21;
      border: 1px solid #2b3444;
      overflow: hidden;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #10151e;
      border-bottom: 1px solid #2b3444;
      z-index: 3;
    }
    #hudText {
      display: grid;
      gap: 2px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.15;
    }
    #bar {
      width: 165px;
      height: 8px;
      border: 1px solid #3c4a64;
      background: #263149;
      overflow: hidden;
    }
    #fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2e8fff, #7fd4ff);
      transition: width 80ms linear;
    }
    button {
      border: 1px solid #3d4659;
      background: #202636;
      color: #eef2f7;
      font-size: 13px;
      font-weight: 700;
      padding: 7px 12px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover { background: #283045; }
    #overlay {
      position: absolute;
      inset: 64px 0 0 0;
      display: grid;
      place-items: center;
      text-align: center;
      white-space: pre-line;
      font-size: 28px;
      font-weight: 700;
      color: #eef2f7;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
      z-index: 2;
      pointer-events: none;
      padding: 16px;
    }
    #loseFill {
      position: absolute;
      inset: 0;
      background: #ff2f2f;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
    }
    #loseFill.show {
      animation: loseFillAnim 450ms ease-out;
    }
    @keyframes loseFillAnim {
      0% { opacity: 0; }
      35% { opacity: 0.82; }
      100% { opacity: 0; }
    }
    canvas {
      position: absolute;
      inset: 0;
      display: block;
      z-index: 1;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="hud">
      <div id="hudText">
        <div id="score">Taps: 0</div>
        <div id="best">Best Taps: -</div>
        <div id="time">Time Left: 00:30</div>
        <div id="target">Level 1 | Target: 60s</div>
        <div id="next">Next: Time 25s | Target 70s</div>
        <div id="bar"><div id="fill"></div></div>
      </div>
      <button id="startBtn" type="button">Start</button>
    </div>
    <div id="overlay">Press Start</div>
    <canvas id="canvas" width="400" height="600"></canvas>
    <div id="loseFill"></div>
  </div>

  <script>
    // ===== Base Dimensions =====
    const WIDTH = 400;
    const HEIGHT = 600;
    const HUD_HEIGHT = 64;
    const INITIAL_RADIUS = 70;

    // ===== Time, Level, and Shrink Config =====
    const START_TIME = 30;
    const GOAL_TIME_START = 60;
    const GOAL_TIME_STEP = 10;
    const MIN_LEVEL_START_TIME = 5;
    const PREP_TIME = 5;
    const MAX_LEVEL = 6;
    const TIMER_DRAIN_RATE = 1.0;
    const BASE_SHRINK = 1.8;
    const MIN_SHRINK = 1.3;
    const MAX_SHRINK = 2.2;
    const PERFECT_WAVE_LIFE = 420;
    const PERFECT_WAVE_START_RADIUS = 10;
    const PERFECT_WAVE_END_RADIUS = 92;

    // ===== Circle Rules =====
    const PERFECT_ZONE = 0.3;
    const GOOD_ZONE = 0.6;
    const BASE_RED_CHANCE = 0.25; // active after 10 score
    const FAKE_COLORS = ["#35c26b", "#f2c43c", "#a55cff", "#ff9a2f"];
    const BEST_TAPS_KEY = "shrinkingPanicBestTaps";

    // ===== DOM Elements =====
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const timeEl = document.getElementById("time");
    const targetEl = document.getElementById("target");
    const nextEl = document.getElementById("next");
    const fillEl = document.getElementById("fill");
    const startBtn = document.getElementById("startBtn");
    const overlay = document.getElementById("overlay");
    const loseFillEl = document.getElementById("loseFill");

    // ===== RAF Helpers =====
    const raf = window.requestAnimationFrame
      ? window.requestAnimationFrame.bind(window)
      : function (cb) { return setTimeout(function () { cb(Date.now()); }, 16); };
    const caf = window.cancelAnimationFrame
      ? window.cancelAnimationFrame.bind(window)
      : clearTimeout;

    // ===== Runtime State =====
    const state = {
      running: false,
      taps: 0,
      bestTaps: null,
      level: 1,
      goalTime: GOAL_TIME_START,
      levelStartTime: START_TIME,
      timeLeft: START_TIME,
      circles: [],
      radius: INITIAL_RADIUS,
      spawnTime: 0,
      shrinkDuration: BASE_SHRINK,
      currentShrink: BASE_SHRINK,
      lastFrameTime: 0,
      floatingTexts: [],
      perfectWaves: [],
      inPrep: false,
      prepRemaining: 0,
      rafId: 0
    };

    // ===== Generic Utilities =====
    function clamp(v, min, max) { return Math.max(min, Math.min(v, max)); }
    function rand(min, max) { return Math.random() * (max - min) + min; }
    function dist(x1, y1, x2, y2) { const dx = x1 - x2; const dy = y1 - y2; return Math.sqrt(dx * dx + dy * dy); }

    // ===== Time Formatting =====
    function formatTime(seconds) {
      const s = Math.max(0, Math.floor(seconds));
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      return mm + ":" + ss;
    }

    // ===== Best Taps Persistence =====
    function loadBestTaps() {
      const raw = Number(localStorage.getItem(BEST_TAPS_KEY));
      if (!Number.isNaN(raw) && raw > 0) state.bestTaps = Math.floor(raw);
    }

    function saveBestTaps() {
      if (state.bestTaps !== null) localStorage.setItem(BEST_TAPS_KEY, String(state.bestTaps));
    }

    // ===== Difficulty Rules =====
    function getCircleCount() {
      if (state.timeLeft > 20) return 1;
      if (state.timeLeft > 15) return 2;
      if (state.timeLeft >= 8) return 3;
      return 4;
    }

    function getRedChance() {
      return state.taps >= 10 ? BASE_RED_CHANCE : 0;
    }

    // ===== Array Shuffle =====
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    // ===== HUD Rendering =====
    function updateHud() {
      scoreEl.textContent = "Taps: " + state.taps;
      bestEl.textContent = "Best Taps: " + (state.bestTaps === null ? "-" : state.bestTaps);
      timeEl.textContent = "Time Left: " + formatTime(state.timeLeft);
      targetEl.textContent = "Level " + state.level + " | Time " + state.levelStartTime + "s | Target " + state.goalTime + "s";
      if (state.level >= MAX_LEVEL) {
        nextEl.textContent = "Next: Finish";
      } else {
        const nextLevel = state.level + 1;
        const nextTime = Math.max(MIN_LEVEL_START_TIME, START_TIME - (nextLevel - 1) * 5);
        const nextTarget = state.goalTime + GOAL_TIME_STEP;
        nextEl.textContent = "Next: Time " + nextTime + "s | Target " + nextTarget + "s";
      }
      fillEl.style.width = (clamp(state.timeLeft / state.goalTime, 0, 1) * 100).toFixed(1) + "%";
    }

    // ===== Level Transition =====
    function applyNextLevel() {
      if (state.level >= MAX_LEVEL) {
        endGame(true);
        return;
      }
      const nextLevel = state.level + 1;
      const nextStartTime = Math.max(MIN_LEVEL_START_TIME, START_TIME - (nextLevel - 1) * 5);
      state.level = nextLevel;
      state.goalTime += GOAL_TIME_STEP;
      state.levelStartTime = nextStartTime;
      state.timeLeft = state.levelStartTime;
      state.inPrep = true;
      state.prepRemaining = PREP_TIME;
      updateHud();
      state.circles = [];
      overlay.textContent = "LEVEL " + state.level + "\nGet Ready: " + Math.ceil(state.prepRemaining);
      overlay.style.display = "grid";
      draw();
    }

    // ===== Circle Build (Correct + Fakes) =====
    function buildCircles() {
      const count = state.taps >= 10 ? Math.max(2, getCircleCount()) : getCircleCount();
      const fakeCount = count - 1;
      const redChance = getRedChance();
      const colors = shuffle(FAKE_COLORS);
      let colorIdx = 0;
      const circles = [{ x: 0, y: 0, correct: true, isRed: false, color: "#2e8fff" }];

      for (let i = 0; i < fakeCount; i += 1) {
        const red = Math.random() < redChance;
        const color = red ? "#ff3b3b" : colors[colorIdx % colors.length];
        colorIdx += 1;
        circles.push({ x: 0, y: 0, correct: false, isRed: red, color: color });
      }
      return circles;
    }

    // ===== Circle Placement (No Overlap) =====
    function placeCircles(circles) {
      const placed = [];
      const m = INITIAL_RADIUS;
      for (let i = 0; i < circles.length; i += 1) {
        let ok = false;
        for (let tries = 0; tries < 220; tries += 1) {
          const x = rand(m, WIDTH - m);
          const y = rand(HUD_HEIGHT + m, HEIGHT - m);
          let overlap = false;
          for (let j = 0; j < placed.length; j += 1) {
            if (dist(x, y, placed[j].x, placed[j].y) < INITIAL_RADIUS * 2 + 8) { overlap = true; break; }
          }
          if (!overlap) {
            circles[i].x = x;
            circles[i].y = y;
            placed.push(circles[i]);
            ok = true;
            break;
          }
        }
        if (!ok) return false;
      }
      return true;
    }

    // ===== Spawn New Circle Set =====
    function spawnCircles() {
      const circles = buildCircles();
      let ok = placeCircles(circles);
      for (let r = 0; !ok && r < 16; r += 1) ok = placeCircles(circles);
      if (!ok) circles.splice(0, circles.length, { x: WIDTH / 2, y: (HUD_HEIGHT + HEIGHT) / 2, correct: true, isRed: false, color: "#2e8fff" });
      state.circles = circles;
      state.spawnTime = performance.now();
      state.lastFrameTime = state.spawnTime;
      state.shrinkDuration = state.currentShrink;
      state.radius = INITIAL_RADIUS;
    }

    // ===== Floating Text Effects =====
    function addFloatingText(x, y, text, color) {
      state.floatingTexts.push({
        x: x,
        y: y,
        text: text,
        color: color || "#d9efff",
        createdAt: performance.now()
      });
    }

    function drawFloatingTexts(now) {
      const lifeMs = 760;
      const keep = [];
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 14px Arial, sans-serif";
      for (let i = 0; i < state.floatingTexts.length; i += 1) {
        const ft = state.floatingTexts[i];
        const age = now - ft.createdAt;
        if (age > lifeMs) continue;
        const t = age / lifeMs;
        ctx.globalAlpha = 1 - t;
        ctx.fillStyle = ft.color;
        ctx.fillText(ft.text, ft.x, ft.y - t * 32);
        keep.push(ft);
      }
      ctx.globalAlpha = 1;
      state.floatingTexts = keep;
    }

    function addPerfectWave(x, y) {
      state.perfectWaves.push({
        x: x,
        y: y,
        createdAt: performance.now()
      });
    }

    function drawPerfectWaves(now) {
      const keep = [];
      for (let i = 0; i < state.perfectWaves.length; i += 1) {
        const w = state.perfectWaves[i];
        const age = now - w.createdAt;
        if (age > PERFECT_WAVE_LIFE) continue;
        const t = age / PERFECT_WAVE_LIFE;
        const eased = 1 - Math.pow(1 - t, 3);
        const radius = PERFECT_WAVE_START_RADIUS + (PERFECT_WAVE_END_RADIUS - PERFECT_WAVE_START_RADIUS) * eased;
        const alpha = (1 - t) * 0.82;
        const line = 1.5 + (1 - t) * 4.5;
        ctx.beginPath();
        ctx.arc(w.x, w.y, radius, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(173, 223, 255, " + alpha.toFixed(3) + ")";
        ctx.lineWidth = line;
        ctx.shadowBlur = 18 * (1 - t);
        ctx.shadowColor = "rgba(120, 198, 255, " + (alpha * 0.95).toFixed(3) + ")";
        ctx.stroke();
        ctx.shadowBlur = 0;
        keep.push(w);
      }
      state.perfectWaves = keep;
    }

    // ===== Main Canvas Draw =====
    function draw() {
      const now = performance.now();
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      if (!state.running && state.circles.length === 0) return;
      for (let i = 0; i < state.circles.length; i += 1) {
        const c = state.circles[i];
        if (c.correct) {
          ctx.beginPath(); ctx.arc(c.x, c.y, state.radius, 0, Math.PI * 2); ctx.fillStyle = "#2e8fff"; ctx.fill();
          ctx.beginPath(); ctx.arc(c.x, c.y, state.radius * GOOD_ZONE, 0, Math.PI * 2); ctx.fillStyle = "#58aaff"; ctx.fill();
          ctx.beginPath(); ctx.arc(c.x, c.y, state.radius * PERFECT_ZONE, 0, Math.PI * 2); ctx.fillStyle = "#87c4ff"; ctx.fill();
          if (state.radius > 24) {
            ctx.fillStyle = "rgba(255,255,255,0.95)";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "bold 11px Arial, sans-serif";
            ctx.fillText("+1.0s", c.x, c.y);
            if (state.radius > 34) {
              ctx.font = "bold 10px Arial, sans-serif";
              ctx.fillText("+0.5s", c.x, c.y + state.radius * 0.44);
              ctx.fillText("+0.0s", c.x, c.y - state.radius * 0.68);
            }
          }
        } else {
          ctx.beginPath(); ctx.arc(c.x, c.y, state.radius, 0, Math.PI * 2); ctx.fillStyle = c.color; ctx.fill();
        }
      }
      drawPerfectWaves(now);
      drawFloatingTexts(now);
    }

    // ===== Finish Screen =====
    function endGame(win) {
      state.running = false;
      caf(state.rafId);
      state.rafId = 0;
      if (win && (state.bestTaps === null || state.taps < state.bestTaps)) {
        state.bestTaps = state.taps;
        saveBestTaps();
      }
      updateHud();
      overlay.textContent = win
        ? "YOU WIN\nTaps: " + state.taps + "\nTime Left: " + state.timeLeft.toFixed(1) + "s"
        : "Game Over\nTaps: " + state.taps + "\nTime Left: " + state.timeLeft.toFixed(1) + "s";
      overlay.style.display = "grid";
      startBtn.textContent = "Restart";
      state.circles = [];
      draw();
      if (!win) {
        loseFillEl.classList.remove("show");
        void loseFillEl.offsetWidth;
        loseFillEl.classList.add("show");
      }
    }

    // ===== Game Loop Update =====
    function update(time) {
      if (!state.running) return;
      if (!state.lastFrameTime) state.lastFrameTime = time;
      const delta = (time - state.lastFrameTime) / 1000;
      state.lastFrameTime = time;

      if (state.inPrep) {
        state.prepRemaining -= delta;
        if (state.prepRemaining <= 0) {
          state.inPrep = false;
          overlay.style.display = "none";
          spawnCircles();
        } else {
          overlay.textContent = "LEVEL " + state.level + "\nGet Ready: " + Math.ceil(state.prepRemaining);
        }
        updateHud();
        draw();
        state.rafId = raf(update);
        return;
      }

      state.timeLeft -= TIMER_DRAIN_RATE * delta;
      if (state.timeLeft <= 0) { endGame(false); return; }

      const elapsed = (time - state.spawnTime) / 1000;
      const progress = elapsed / state.shrinkDuration;
      state.radius = INITIAL_RADIUS * (1 - progress);
      if (progress >= 1) {
        spawnCircles();
        draw();
        state.rafId = raf(update);
        return;
      }

      updateHud();
      draw();
      state.rafId = raf(update);
    }

    // ===== Pointer Coordinates =====
    function getPoint(e) {
      const rect = canvas.getBoundingClientRect();
      const t = e.changedTouches && e.changedTouches[0]
        ? e.changedTouches[0]
        : (e.touches && e.touches[0] ? e.touches[0] : null);
      const x = t ? t.clientX : e.clientX;
      const y = t ? t.clientY : e.clientY;
      return { x: x - rect.left, y: y - rect.top };
    }

    // ===== Click Handling =====
    function handleClick(e) {
      if (!state.running) return;
      if (state.inPrep) return;
      if (e.cancelable) e.preventDefault();
      const tapTime = performance.now();
      const p = getPoint(e);

      for (let i = 0; i < state.circles.length; i += 1) {
        const c = state.circles[i];
        const d = dist(p.x, p.y, c.x, c.y);
        if (d > state.radius) continue;

        if (c.correct) {
          let bonus = 0.0;
          let zone = "EDGE";
          if (d <= state.radius * PERFECT_ZONE) {
            bonus = 1.0;
            zone = "PERFECT";
            addPerfectWave(p.x, p.y);
          } else if (d <= state.radius * GOOD_ZONE) {
            bonus = 0.5;
            zone = "GOOD";
          }
          addFloatingText(p.x, p.y, zone + " +" + bonus.toFixed(1) + "s", "#d9efff");

          const reactionTime = (tapTime - state.spawnTime) / 1000;
          if (reactionTime < 0.5) state.currentShrink += 0.1;
          else if (reactionTime > 1.0) state.currentShrink -= 0.1;
          state.currentShrink = clamp(state.currentShrink, MIN_SHRINK, MAX_SHRINK);

          state.timeLeft = Math.min(state.timeLeft + bonus, state.goalTime);
          state.taps += 1;

          if (state.timeLeft >= state.goalTime) { applyNextLevel(); return; }
          updateHud();
          spawnCircles();
          draw();
          return;
        }

        if (c.isRed) { endGame(false); return; }
        return; // fake color click: ignore
      }
      // empty click: ignore
    }

    // ===== Start / Restart =====
    function startGame() {
      if (!ctx) return;
      state.running = true;
      state.taps = 0;
      state.level = 1;
      state.goalTime = GOAL_TIME_START;
      state.levelStartTime = START_TIME;
      state.timeLeft = START_TIME;
      state.currentShrink = BASE_SHRINK;
      state.floatingTexts = [];
      state.perfectWaves = [];
      state.inPrep = false;
      state.prepRemaining = 0;
      state.radius = INITIAL_RADIUS;
      overlay.style.display = "none";
      startBtn.textContent = "Restart";
      updateHud();
      spawnCircles();
      draw();
      caf(state.rafId);
      state.rafId = raf(update);
    }

    // ===== App Init =====
    function init() {
      if (!ctx) { overlay.textContent = "Canvas is not supported"; startBtn.disabled = true; return; }
      loadBestTaps();
      updateHud();
      draw();
      startBtn.addEventListener("click", startGame);
      canvas.addEventListener("click", handleClick);
      canvas.addEventListener("touchstart", handleClick, { passive: false });
    }

    init();
  </script>
</body>
</html>
